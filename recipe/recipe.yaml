schema_version: 1

context:
  version: "0.6.5"

package:
  name: validatedata
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/v/validatedata/validatedata-${{ version }}.tar.gz
  sha256: 0b08e2d62a9912e034da312a3aa6e888f5289f9b26a9d7a37bf7c65120401ec2

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - setuptools >=61.0
    - wheel
    - pip
  run:
    - python >=${{ python_min }}
    - python-dateutil

tests:
  - python:
      imports:
        - validatedata
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  summary: An easier way to validate data in python
  license: MIT
  license_file: LICENSE
  homepage: https://github.com/Edward-K1/validatedata
  documentation: https://validatedata.readthedocs.io

extra:
  recipe-maintainers:
    - thewchan
